# Campaign Manager — Production
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    # Use the image built by GitHub Actions
    image: ghcr.io/falconandrea/test-shopfully-backend:latest
    volumes:
      - ./storage:/var/www/html/storage/app
    ports: !reset []
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      # Nomi dei router cambiati in shopfully-backend per evitare conflitti
      - "traefik.http.routers.shopfully-backend.rule=Host(`test-shopfully.andreafalcon.dev`) && PathPrefix(`/api`, `/storage`)"
      - "traefik.http.routers.shopfully-backend.entrypoints=websecure"
      - "traefik.http.routers.shopfully-backend.tls.certresolver=myresolver"
      - "traefik.http.services.shopfully-backend.loadbalancer.server.port=80"
    networks:
      - web
      - app-network

  frontend:
    # Use the image built by GitHub Actions
    image: ghcr.io/falconandrea/test-shopfully-frontend:latest
    volumes: !reset []
    ports: !reset []
    environment:
      - VITE_API_BASE_URL=https://test-shopfully.andreafalcon.dev/api
    labels:
      - "traefik.enable=true"
      # Nomi dei router cambiati in shopfully-frontend per evitare conflitti
      - "traefik.http.routers.shopfully-frontend.rule=Host(`test-shopfully.andreafalcon.dev`)"
      - "traefik.http.routers.shopfully-frontend.entrypoints=websecure"
      - "traefik.http.routers.shopfully-frontend.tls.certresolver=myresolver"
      - "traefik.http.routers.shopfully-frontend.priority=1"
      - "traefik.http.services.shopfully-frontend.loadbalancer.server.port=5173"
    depends_on:
      - backend
    networks:
      - web
      - app-network

networks:
  web:
    external: true
  app-network:
    driver: bridge
